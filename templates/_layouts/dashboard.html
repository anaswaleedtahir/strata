{% extends "_layouts/base.html" %}

{% block content %}
<div class="space-y-7">
  <header class="flex flex-col gap-4 py-2 sm:flex-row sm:items-end sm:justify-between">
    <div class="space-y-1">
      <p class="text-sm font-medium text-muted-foreground">Workspace</p>
      <h1 class="text-pretty text-3xl font-bold tracking-tight">{% block page_title %}Dashboard{% endblock %}</h1>
    </div>
    <div class="flex flex-wrap items-center gap-2">{% block page_actions %}{% endblock %}</div>
  </header>

  {% block dashboard_content %}{% endblock %}
</div>
{% endblock %}
