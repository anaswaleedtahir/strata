<c-vars title="Nothing here yet" subtitle="" icon="inbox" action_url="" action_text="" />
<div class="flex flex-col items-center justify-center rounded-xl border border-dashed px-6 py-16 text-center">
  <div class="mb-4 flex size-12 items-center justify-center rounded-full bg-muted text-muted-foreground">
    <c-ui.icon :name="icon" classes="size-6" />
  </div>
  <h2 class="text-lg font-semibold">{{ title }}</h2>
  {% if subtitle %}<p class="mt-1 max-w-md text-sm text-muted-foreground">{{ subtitle }}</p>{% endif %}
  {% if action_url and action_text %}
    <c-button href="{{ action_url }}" class="mt-6">{{ action_text }}</c-button>
  {% endif %}
</div>
