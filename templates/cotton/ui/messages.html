<div class="pointer-events-none fixed right-4 top-20 z-50 grid w-[calc(100%-2rem)] max-w-sm gap-2" aria-live="polite">
  {% for message in messages %}
    <div
      x-data="{ show: true }"
      x-show="show"
      x-transition
      class="pointer-events-auto flex items-start gap-3 rounded-lg border bg-background p-4 shadow-lg {% if message.tags == 'error' %}border-destructive/50{% endif %}"
      role="{% if message.tags == 'error' %}alert{% else %}status{% endif %}"
    >
      <c-ui.icon name="{% if message.tags == 'error' %}exclamation-circle{% elif message.tags == 'success' %}check-circle{% else %}information-circle{% endif %}" classes="mt-0.5 size-5 {% if message.tags == 'error' %}text-destructive{% else %}text-foreground{% endif %}" />
      <p class="flex-1 text-sm">{{ message }}</p>
      <button type="button" @click="show = false" class="rounded-sm text-muted-foreground hover:text-foreground focus-visible:outline-hidden focus-visible:ring-1 focus-visible:ring-ring" aria-label="Dismiss message">
        <c-ui.icon name="x" classes="size-4" />
      </button>
    </div>
  {% endfor %}
</div>
