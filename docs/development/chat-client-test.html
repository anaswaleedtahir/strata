<!doctype html>
<meta charset="utf-8">
<title>ChatClient smoke test</title>
<pre id="result">Running…</pre>
<script>
  class MockWebSocket {
    static CONNECTING = 0;
    static OPEN = 1;
    static CLOSING = 2;
    static CLOSED = 3;

    constructor(url) {
      this.url = url;
      this.readyState = MockWebSocket.OPEN;
    }

    send(data) { this.sent = data; }
    close() { this.readyState = MockWebSocket.CLOSED; }
  }

  window.WebSocket = MockWebSocket;
</script>
<script src="../../static/js/chat-client.js"></script>
<script>
  const client = new ChatClient(42);
  client.connect();
  const sent = client.sendMessage(" hello ");
  const passed = sent && JSON.parse(client.socket.sent).message === "hello";
  document.getElementById("result").textContent = passed ? "PASS" : "FAIL";
  if (!passed) throw new Error("ChatClient smoke test failed");
</script>
