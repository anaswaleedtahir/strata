<form method="post" class="space-y-6">
  {% csrf_token %}

  {% if form.non_field_errors %}
    <c-alert variant="destructive">
      <c-ui.icon name="exclamation-circle" classes="size-4" />
      <c-alert.description>
        {% for error in form.non_field_errors %}<p>{{ error }}</p>{% endfor %}
      </c-alert.description>
    </c-alert>
  {% endif %}

  <c-forms.field :field="form.old_password" label="Current password" placeholder="Current password" required />
  <c-forms.field :field="form.new_password1" label="New password" placeholder="New password" required />
  <c-forms.field :field="form.new_password2" label="Confirm new password" placeholder="Repeat new password" required />

  <div class="flex flex-col-reverse gap-2 sm:flex-row sm:justify-end">
    <c-button href="{% url 'users:profile' %}" variant="outline">Cancel</c-button>
    <c-button type="submit">
      <c-ui.icon name="key" classes="size-4" /> Change password
    </c-button>
  </div>
</form>
