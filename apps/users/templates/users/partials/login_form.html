<form method="post" class="space-y-5">
  {% csrf_token %}
  {% firstof request.POST.next request.GET.next "" as next_url %}
  <input type="hidden" name="next" value="{{ next_url }}">

  {% if form.non_field_errors %}
    <c-alert variant="destructive">
      <c-ui.icon name="exclamation-circle" classes="size-4" />
      <c-alert.description>
        {% for error in form.non_field_errors %}<p>{{ error }}</p>{% endfor %}
      </c-alert.description>
    </c-alert>
  {% endif %}

  <c-forms.field :field="form.email" label="Email" placeholder="you@example.com" icon="at-symbol" required />
  <c-forms.field :field="form.password" label="Password" placeholder="Enter your password" required />

  <div class="flex items-center justify-between gap-4 text-sm">
    <label class="flex items-center gap-2">
      <input type="checkbox" name="remember_me" class="size-4 rounded-sm accent-primary">
      <span>Keep me signed in</span>
    </label>
    <a href="{% url 'account_reset_password' %}" class="text-muted-foreground underline-offset-4 hover:text-foreground hover:underline">Forgot password?</a>
  </div>

  <c-button type="submit" class="w-full">
    <c-ui.icon name="login" classes="size-4" /> Sign in
  </c-button>
</form>
