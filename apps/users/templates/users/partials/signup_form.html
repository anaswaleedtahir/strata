<form method="post" class="space-y-5">
  {% csrf_token %}

  {% if form.non_field_errors %}
    <c-alert variant="destructive">
      <c-ui.icon name="exclamation-circle" classes="size-4" />
      <c-alert.description>
        {% for error in form.non_field_errors %}<p>{{ error }}</p>{% endfor %}
      </c-alert.description>
    </c-alert>
  {% endif %}

  <div class="grid gap-5 sm:grid-cols-2">
    <c-forms.field :field="form.first_name" label="First name" placeholder="Amina" required />
    <c-forms.field :field="form.last_name" label="Last name" placeholder="Khan" required />
  </div>
  <c-forms.field :field="form.email" label="Email" placeholder="you@example.com" icon="at-symbol" required />
  <c-forms.field :field="form.password1" label="Password" placeholder="Create a strong password" required />
  <c-forms.field :field="form.password2" label="Confirm password" placeholder="Repeat your password" required />

  <p class="text-xs leading-5 text-muted-foreground">
    By creating an account, you agree to use Strata responsibly and keep Property information accurate.
  </p>

  <c-button type="submit" class="w-full">
    <c-ui.icon name="user-add" classes="size-4" /> Create account
  </c-button>
</form>
