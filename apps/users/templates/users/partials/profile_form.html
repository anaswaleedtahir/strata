<form method="post" class="space-y-6">
  {% csrf_token %}

  {% if form.non_field_errors %}
    <c-alert variant="destructive">
      <c-ui.icon name="exclamation-circle" classes="size-4" />
      <c-alert.description>
        {% for error in form.non_field_errors %}<p>{{ error }}</p>{% endfor %}
      </c-alert.description>
    </c-alert>
  {% endif %}

  <div class="grid gap-6 sm:grid-cols-2">
    <c-forms.field :field="form.first_name" label="First name" placeholder="First name" required />
    <c-forms.field :field="form.last_name" label="Last name" placeholder="Last name" required />
  </div>
  <c-forms.field :field="form.email" label="Email" placeholder="you@example.com" icon="at-symbol" required />

  <div class="flex flex-col-reverse gap-2 sm:flex-row sm:justify-end">
    <c-button href="{% url 'users:profile' %}" variant="outline">Cancel</c-button>
    <c-button type="submit">
      <c-ui.icon name="check" classes="size-4" /> Save changes
    </c-button>
  </div>
</form>
