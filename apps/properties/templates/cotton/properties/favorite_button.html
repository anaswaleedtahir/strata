<c-vars property />
<button
  type="button"
  hx-post="{% url 'properties:favorite_toggle' property.pk %}"
  hx-swap="outerHTML"
  class="inline-flex size-9 items-center justify-center rounded-full border bg-background/95 text-muted-foreground shadow-xs backdrop-blur transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-hidden focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50"
  aria-label="{% if property.is_favorited %}Remove {{ property.name }} from favorites{% else %}Add {{ property.name }} to favorites{% endif %}"
>
  <span class="htmx-indicator size-4 animate-spin rounded-full border-2 border-muted-foreground/30 border-t-foreground"></span>
  <c-ui.icon
    name="heart"
    variant="{% if property.is_favorited %}solid{% else %}outline{% endif %}"
    classes="size-4 htmx-indicator-hide {% if property.is_favorited %}text-destructive{% endif %}"
  />
</button>
